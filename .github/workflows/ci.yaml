name: CI check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: read

jobs:
  changes:
    runs-on: ubuntu-24.04
    if: ${{ !github.event.pull_request.draft }}

    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dorny/paths-filter@61f87a10cd2c304679af17bb73ef192addf33c1c
        id: filter
        with:
          filters: |
            lint:
              - 'frontend/**/*.ts'
              - 'frontend/**/*.tsx'
              - 'frontend/**/*.js'
              - 'frontend/**/*.jsx'
              - 'frontend/**/*.scss'
              - 'frontend/package.json'
              - 'frontend/Makefile'
              - 'backend/**/*.py'
              - 'backend/pyproject.toml'
              - 'backend/tox.ini'
              - 'backend/Makefile'
              - 'Makefile'
            backend:
              - 'backend/**/*.py'
              - 'backend/pyproject.toml'
              - 'backend/tox.ini'
              - 'backend/Makefile'
            frontend:
              - 'frontend/**/*.ts'
              - 'frontend/**/*.tsx'
              - 'frontend/**/*.js'
              - 'frontend/**/*.jsx'
              - 'frontend/**/*.scss'
              - 'frontend/package.json'
              - 'frontend/Makefile'
            docs:
              - 'rtd-docs/**'

  lint:
    runs-on: ubuntu-24.04
    needs: changes
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.lint == 'true' }}
    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'main' || github.base_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup

      - name: Run lint
        run: |
          su ubuntu -c "make ci-lint"

  test-backend:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.backend == 'true' }}

    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'main' || github.base_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup

      - name: Test
        run: |
          CACHE_DIR=/home/ubuntu/.cache/pip
          su ubuntu -c "PIP_CACHE_DIR=$CACHE_DIR make -C backend ci-test"

  test-frontend:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.frontend == 'true' }}

    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'main' || github.base_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup
      - name: Set correct ownership of frontend directory
        run: |
          chown -R ubuntu:ubuntu frontend/node_modules
      - name: Test
        run: |
          su ubuntu -c "make -C frontend ci-test"
  test-docs:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.docs == 'true' }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
      - name: Create venv
        working-directory: "rtd-docs"
        run: make install
      - name: Lint markdown
        working-directory: "rtd-docs"
        run: make lint-md
      - name: Test build
        working-directory: "rtd-docs"
        run: make html

  ci-check:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test-backend, test-frontend, test-docs]
    steps:
      - name: Determine overall CI status
        id: status
        run: |
          # If any dependency failed or was cancelled, mark as failure
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "state=failure" >> $GITHUB_OUTPUT
          else
            echo "state=success" >> $GITHUB_OUTPUT
          fi

      - name: Parse Preferences & Send Mattermost Notifications
        id: MattermostStep
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
          MATTERMOST_BOT_TOKEN: ${{ secrets.MATTERMOST_BOT_TOKEN }}
          DEFAULT_CHANNEL: ${{ vars.MM_CHANNEL }}
          CI_STATE: ${{ steps.status.outputs.state }}
        with:
          github-token: ${{ secrets.ADMIN_PAT || github.token }}
          script: |
            const state = process.env.CI_STATE;
            const emoji = state === 'success' ? '✅' : ':notlikethis:';

            let statusMessage = "";
            let prNumber = null;

            if (context.eventName === 'pull_request') {
              prNumber = context.payload.pull_request.number;
              const prUrl = context.payload.pull_request.html_url;
              const prTitle = context.payload.pull_request.title;
              statusMessage = `${emoji} CI Checks for [PR #${prNumber} ${prTitle}](${prUrl}) finished: **${state}**.`;
            } else {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              statusMessage = `${emoji} [CI Checks on Merge](${runUrl}) finished: **${state}**.`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });

            const promptText = "Check where you would like a Mattermost message to be sent";
            const MattermostComment = comments.find(c => c.body.includes(promptText));

            if (!MattermostComment) {
              console.log("No permission comment found. Skipping.");
              return;
            }

            const wantsDM = /-\s*\[[xX]\]\s*Direct message/i.test(MattermostComment.body);
            const wantsChannel = /-\s*\[[xX]\]\s*~${{ vars.MM_CHANNEL }}/i.test(MattermostComment.body);

            if (!wantsDM && !wantsChannel) {
              console.log("No options selected. Skipping.");
              return;
            }

            let targetChannels = [];
            const defaultChannel = process.env.DEFAULT_CHANNEL;

            if (wantsChannel) {
              targetChannels.push(defaultChannel);
            }

            if (wantsDM) {
              try {
                const { data: commitData } = await github.rest.repos.getCommit({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: context.payload.pull_request.head.sha
                });
                const email = commitData.commit.author.email;

                const MattermostURL = new URL(process.env.MATTERMOST_WEBHOOK_URL).origin;
                const MattermostResponse = await fetch(`${MattermostURL}/api/v4/users/email/${email}`, {
                  headers: { 'Authorization': `Bearer ${process.env.MATTERMOST_BOT_TOKEN}` }
                });

                if (MattermostResponse.ok) {
                  const MattermostUser = await MattermostResponse.json();
                  targetChannels.push(`@${MattermostUser.username}`);
                } else {
                  statusMessage += `\n*(Note: Could not find Mattermost account for ${email}. Falling back to ~${defaultChannel})*`;
                  if (!targetChannels.includes(defaultChannel)) {
                    targetChannels.push(defaultChannel);
                  }
                }
              } catch (e) {
                console.error("Mattermost lookup failed:", e);
                statusMessage += `\n*(Note: Mattermost user lookup failed. Falling back to ~${defaultChannel})*`;
                if (!targetChannels.includes(defaultChannel)) {
                  targetChannels.push(defaultChannel);
                }
              }
            }

            console.log(`Sending notifications to: ${targetChannels.join(', ')}`);

            for (const channel of targetChannels) {
              const payload = {
                text: statusMessage,
                channel: channel,
                username: "maasbot",
                icon_url: "https://launchpadlibrarian.net/91453111/Phoenix_landing-64x64.jpg"
              };

              const res = await fetch(process.env.MATTERMOST_WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
              });

              if (!res.ok) {
                console.error(`Failed to send to ${channel}: ${res.status} ${res.statusText}`);
              } else {
                console.log(`Successfully sent to ${channel}`);
              }
            }

      - name: Fail pipeline if dependencies failed
        if: steps.status.outputs.state == 'failure'
        run: exit 1
