name: CI check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read
  packages: read

jobs:
  save-pr-number:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Save PR number to artifact
        run: echo "${{ github.event.pull_request.number }}" > pr-number.txt
      - name: Upload PR number artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-number
          path: pr-number.txt

  changes:
    runs-on: ubuntu-24.04
    if: ${{ !github.event.pull_request.draft }}

    outputs:
      lint: ${{ steps.filter.outputs.lint }}
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            lint:
              - 'frontend/**/*.ts'
              - 'frontend/**/*.tsx'
              - 'frontend/**/*.js'
              - 'frontend/**/*.jsx'
              - 'frontend/**/*.scss'
              - 'frontend/package.json'
              - 'frontend/Makefile'
              - 'backend/**/*.py'
              - 'backend/pyproject.toml'
              - 'backend/tox.ini'
              - 'backend/Makefile'
              - 'Makefile'
            backend:
              - 'backend/**/*.py'
              - 'backend/pyproject.toml'
              - 'backend/tox.ini'
              - 'backend/Makefile'
            frontend:
              - 'frontend/**/*.ts'
              - 'frontend/**/*.tsx'
              - 'frontend/**/*.js'
              - 'frontend/**/*.jsx'
              - 'frontend/**/*.scss'
              - 'frontend/package.json'
              - 'frontend/Makefile'
            docs:
              - 'rtd-docs/**'

  lint:
    runs-on: ubuntu-24.04
    needs: changes
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.lint == 'true' }}
    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'main' || github.base_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup

      - name: Run lint
        run: |
          su ubuntu -c "make ci-lint"

  validate-conventional-commit:
    if: ${{ github.event_name == 'pull_request' }}
    name: Validate Conventional Commit standard
    runs-on: ubuntu-slim
    steps:
      - name: Check PR title for Conventional Commits format
        uses: amannn/action-semantic-pull-request@v5
        with:
          types: |
            feat
            fix
            refactor
            perf
            test
            chore
            docs
          scopes: |
            fe-base
            fe-images
            fe-accounts
            fe-sites
            fe-settings
            fe-tokens
            be-config
            be-settings
            be-sites
            be-tokens
            be-accounts
            be-db
            be-images
            docs
            ci
            structural
            content
            linting
            links
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify BREAKING CHANGE in description
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Safely read the multiline PR body from the environment variable
          PR_BODY="$PR_BODY_ENV"

          # Extract everything before the first colon in the title
          # e.g., "feat(ui)!: rewrite" becomes "feat(ui)!"
          PREFIX="${PR_TITLE%%:*}"

          # If the prefix contains an exclamation mark, it's a breaking change
          if [[ "$PREFIX" == *"!"* ]]; then
            echo "⚠️ Breaking change indicator ('!') detected in PR title."

            # Check if the body contains the required text
            if [[ "$PR_BODY" != *"BREAKING CHANGE:"* ]]; then
              echo "❌ Error: PR title indicates a breaking change, but 'BREAKING CHANGE:' is missing from the PR description."
              exit 1
            fi

            echo "✅ 'BREAKING CHANGE:' found in the description."
          else
            echo "ℹ️ No breaking change indicator in title. Skipping description check."
          fi
        env:
          # We pass the body as an env var to prevent bash syntax errors
          # that occur when injecting multiline strings directly via ${{ }}
          PR_BODY_ENV: ${{ github.event.pull_request.body }}

  test-backend:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.backend == 'true' }}

    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'main' || github.base_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup

      - name: Test
        run: |
          CACHE_DIR=/home/ubuntu/.cache/pip
          su ubuntu -c "PIP_CACHE_DIR=$CACHE_DIR make -C backend ci-test"

  test-frontend:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.frontend == 'true' }}

    container:
      image: ghcr.io/${{ github.repository }}-build-env:${{ github.event_name == 'merge_group' && 'main' || github.base_ref }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
      - uses: ./.github/actions/ci-setup
      - name: Set correct ownership of frontend directory
        run: |
          chown -R ubuntu:ubuntu frontend/node_modules
      - name: Test
        run: |
          su ubuntu -c "make -C frontend ci-test"
  test-docs:
    needs: changes
    runs-on: ubuntu-24.04
    if: >-
      ${{ !github.event.pull_request.draft && needs.changes.outputs.docs == 'true' }}
    steps:
      - uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0
      - name: Create venv
        working-directory: "rtd-docs"
        run: make install
      - name: Lint markdown
        working-directory: "rtd-docs"
        run: make lint-md
      - name: Test build
        working-directory: "rtd-docs"
        run: make html

  ci-check:
    runs-on: ubuntu-latest
    if: always()
    needs: [changes, validate-conventional-commit, lint, test-backend, test-frontend, test-docs]
    steps:
      - name: Determine overall CI status
        id: status
        run: |
          # If any dependency failed or was cancelled, mark as failure
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "state=failure" >> $GITHUB_OUTPUT
          else
            echo "state=success" >> $GITHUB_OUTPUT
          fi

      - name: Fail pipeline if dependencies failed
        if: steps.status.outputs.state == 'failure'
        run: exit 1
