# GitHub Copilot Rules

# This file contains scoped Copilot guidance for the project.
# Backend rules apply strictly to code in the backend directory (`backend/`).
# Frontend rules can be defined separately when ready.

backend:
  description: >
    Copilot guidance for the backend service. These rules apply exclusively to
    code within the backend directory (`backend/`).
  scope:
    - backend/**
  rules:
    - Prefer clear, descriptive variable and function names.
    - Write docstrings for all public functions, classes, and modules.
    - Follow PEP8 for Python code style and formatting.
    - Use type hints for all function signatures.
    - Avoid abbreviations unless they are widely understood.
    - Write code that is modular and testable.
    - Prefer explicit over implicit code.
    - Handle exceptions gracefully and log errors where appropriate.
    - Use environment variables for secrets and configuration, never hardcode them.
    - Write unit tests for new features and bug fixes.
    - Follow the backend tox workflow described in the tooling section.
  tooling:
    - Execute all formatting, linting, and testing commands from the backend directory.
    - Use `tox -e format` to format the code.
    - Use `tox -e lint` to run linters.
    - Use `tox -e check` to run static checkers.
    - Use `tox -e test-unit` to run all unit tests.
    - Use `tox -e test-unit -- $file` to run only unit tests defined in $file.
    - Use `tox -e test` to run the full test suite and generate a coverage report.
  security:
    - Never suggest hardcoded credentials, secrets, or tokens.
    - Validate and sanitize all user inputs.
    - Use parameterized queries for database access.
    - Avoid use of deprecated or insecure libraries.
  documentation:
    - Update relevant documentation with every code or API change.
    - Ensure README and inline comments are kept up to date.
  collaboration:
    - Follow the project's code review and pull request process.
    - Tag relevant team members for specialized reviews.
    - Reference related issues and link to documentation in PRs.
  copilot:
    - Do not suggest code that is not compatible with the current Python version in use.
    - Avoid generating large boilerplate unless explicitly requested.
    - Prefer project-specific patterns and idioms when available.
    - Suggest refactoring when code duplication is detected.

frontend:
  description: >
    Reserved for frontend-specific Copilot guidance. Populate these lists when
    the frontend rules are defined.
  scope:
    - frontend/**
  rules: []
  tooling: []
  security: []
  documentation: []
  collaboration: []
  copilot: []

# End of Copilot Rules